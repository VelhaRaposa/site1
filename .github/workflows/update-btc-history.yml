name: Atualizar histórico do Bitcoin

# Roda automaticamente todo dia às 06:00 (horário de Brasília é UTC-3,
# então 09:00 UTC), e também pode ser disparado manualmente na aba
# "Actions" do GitHub, botão "Run workflow". Os próprios scripts não
# incluem o candle do dia corrente (ainda em formação) — então mesmo
# rodando diariamente, a defasagem máxima do dataset é de 1 dia.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

# Necessário para o robô poder commitar a atualização de volta no repositório.
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar e adicionar os dias novos (BRL)
        env:
          # Opcional: crie um "Secret" chamado COINGECKO_API_KEY nas
          # configurações do repositório (Settings → Secrets and
          # variables → Actions) com sua chave gratuita da CoinGecko.
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python3 scripts/update_btc_history.py

      - name: Buscar e adicionar os dias novos (USD)
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python3 scripts/update_btc_history_usd.py

      - name: Commitar alterações (se houver algo novo)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/btc-history.json assets/data/btc-history-usd.json
          git diff --cached --quiet && echo "Nada novo para commitar." || git commit -m "Atualiza histórico do Bitcoin (automático)"
          # Outros robôs agendados também commitam direto na main; se um deles
          # empurrar um commit entre o nosso checkout e o push, o push é
          # rejeitado (non-fast-forward). Sincroniza e tenta de novo antes de
          # desistir — como cada robô mexe em arquivos diferentes, o rebase
          # não deve gerar conflito real.
          n=0
          until git push; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "git push falhou após $n tentativas." >&2
              exit 1
            fi
            git fetch origin main
            git rebase origin/main
            sleep $((n * 3))
          done
