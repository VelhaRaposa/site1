name: Atualizar vídeos recentes (Home e Agenda)

# Roda automaticamente todo dia às 09:40 (horário de Brasília é UTC-3,
# então 09:40 UTC — 40 minutos depois do robô do Bitcoin, para não
# disputar o mesmo commit), e também pode ser disparado manualmente na
# aba "Actions" do GitHub, botão "Run workflow".
#
# Busca o feed RSS público do YouTube direto (sem proxy de terceiro) e
# reescreve só o trecho entre os marcadores <!-- videos:start -->/
# <!-- videos:end --> em index.html e agenda/index.html — o resto de
# cada arquivo nunca é tocado. Ver scripts/update_videos.py.
on:
  schedule:
    - cron: "40 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar vídeos recentes e atualizar Home/Agenda
        run: python3 scripts/update_videos.py

      - name: Commitar alterações (se houver algo novo)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html agenda/index.html
          git diff --cached --quiet && echo "Nada novo para commitar." || git commit -m "Atualiza vídeos recentes da Home e Agenda (automático)"
          # Outros robôs agendados também commitam direto na main; se um deles
          # empurrar um commit entre o nosso checkout e o push, o push é
          # rejeitado (non-fast-forward). Sincroniza e tenta de novo antes de
          # desistir — como cada robô mexe em arquivos diferentes, o rebase
          # não deve gerar conflito real.
          n=0
          until git push; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "git push falhou após $n tentativas." >&2
              exit 1
            fi
            git fetch origin main
            git rebase origin/main
            sleep $((n * 3))
          done
