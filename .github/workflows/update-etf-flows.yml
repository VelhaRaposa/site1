name: Atualizar ETF Flows (Farside)

# PRODUÇÃO — alimenta o site. Roda todo dia às 11:00 de Brasília (UTC-3,
# então 14:00 UTC), horário escolhido pra publicar antes da live das
# 14h e ainda dar folga pra Farside consolidar o dia anterior (ver
# decisão completa no README, seção ETF Flows). Também pode ser
# disparado manualmente na aba "Actions" do GitHub, botão "Run workflow".
#
# Reprocessa sempre os últimos REPROCESS_DAYS dias (não só datas novas)
# — ver scripts/update_etf_flows.py, docstring do módulo e reprocessar().
#
# Este workflow tem 2 irmãos, mesmo script, mesmo comportamento:
# - verify-etf-flows.yml: mesma chamada às 18:00 de Brasília, mais um
#   log de auditoria (--audit-log) — camada extra de conferência.
# - research-etf-flows-timing.yml: TEMPORÁRIO, só observação, nunca
#   escreve dado público — descobre estatisticamente o horário ideal.
#
# Fonte única: farside.co.uk/bitcoin-etf-flow-all-data/ (fluxos em US$,
# ETFs spot de Bitcoin dos EUA). Ver scripts/update_etf_flows.py e o
# README, seção ETF Flows.
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar, adicionar dias novos e reprocessar os últimos dias (Farside)
        run: python3 scripts/update_etf_flows.py

      - name: Commitar alterações (se houver algo novo)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/etf-flows-daily.json assets/data/etf-flows-summary.json
          git diff --cached --quiet && echo "Nada novo para commitar." || git commit -m "Atualiza ETF Flows (automático)"
          # Outros robôs agendados também commitam direto na main; se um deles
          # empurrar um commit entre o nosso checkout e o push, o push é
          # rejeitado (non-fast-forward). Sincroniza e tenta de novo antes de
          # desistir — como cada robô mexe em arquivos diferentes, o rebase
          # não deve gerar conflito real.
          n=0
          until git push; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "git push falhou após $n tentativas." >&2
              exit 1
            fi
            git fetch origin main
            git rebase origin/main
            sleep $((n * 3))
          done
