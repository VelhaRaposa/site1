name: TEMP — Teste de conectividade Farside

# Workflow TEMPORÁRIO, só para diagnóstico — não commita nada, não
# publica nada. Existe só para responder "o runner do GitHub Actions
# consegue acessar farside.co.uk de verdade?" antes do merge do PR
# principal. Remover este arquivo e scripts/test_farside_fetch.py
# assim que a pergunta for respondida.
#
# Disparado por "push" (não por "workflow_dispatch"/"schedule") de
# propósito: esses dois só funcionam para workflows já presentes na
# branch padrão (main), e este teste precisa rodar ainda na branch de
# desenvolvimento, antes do merge.
on:
  push:
    branches:
      - claude/etf-tracker-data-sources-f0a7jd
    paths:
      - ".github/workflows/test-farside-fetch.yml"
      - "scripts/test_farside_fetch.py"
      - "scripts/update_etf_flows.py"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: GET Farside + parser (sem salvar nada)
        run: python3 scripts/test_farside_fetch.py
