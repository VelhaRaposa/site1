<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Caio Garé</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header id="site-header"></header>

<section style="padding-top:60px;">
  <div class="container">
    <p class="eyebrow">agenda</p>
    <h1>Lives e vídeos</h1>
    <p class="lead" style="max-width:560px;">Todo conteúdo acontece no YouTube, com reprises disponíveis no Spotify. Aqui você encontra os dias fixos e os vídeos mais recentes.</p>
  </div>
</section>

<section class="section-border-top">
  <div class="container" style="max-width:640px;">
    <h2>Dias fixos</h2>
    <div id="agenda-list"></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;">
      <a href="https://www.youtube.com/@caiogare" target="_blank" rel="noopener" class="btn btn-primary">Ir para o YouTube</a>
      <a href="https://open.spotify.com/show/3sBJa8iCt2POBsdVbHaIfO?si=Ii1vu6JfSEydfdBc-GJ5BQ" target="_blank" rel="noopener" class="btn btn-ghost">Ir para o Spotify</a>
    </div>
  </div>
</section>

<section class="section-border-top">
  <div class="container">
    <h2>Vídeos recentes</h2>
    <div class="grid grid-3" id="agenda-videos"></div>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="assets/js/content.js"></script>
<script src="assets/js/analytics.js"></script>
<script src="assets/js/nav.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  document.getElementById("agenda-list").innerHTML = SITE.agenda.map(a => `
    <div class="schedule-row">
      <span class="day">${a.dia}</span>
      <span class="time">${a.horario}</span>
      <span class="title">${a.titulo}</span>
    </div>
  `).join("");

  const wrap = document.getElementById("agenda-videos");
  wrap.innerHTML = `<p style="color:var(--text-muted);">Carregando vídeos…</p>`;
  const videos = await getLatestVideos(6);
  wrap.innerHTML = videos.map(v => `
    <a class="card video-card" href="${v.url}" target="_blank" rel="noopener">
      <div class="video-thumb">${v.thumb ? `<img src="${v.thumb}" alt="">` : "▶"}</div>
      ${v.pilar ? `<span class="tag">${v.pilar}</span>` : ""}
      <div class="video-title">${v.titulo}</div>
      ${v.views ? `<div class="video-meta">${v.views}</div>` : ""}
    </a>
  `).join("");
});
</script>
</body>
</html>
