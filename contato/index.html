<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — Caio Garé</title>
<!-- Favicons — Caio Garé -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0B2138">
<meta name="description" content="Fale com Caio Garé por e-mail para parcerias, dúvidas ou proposta comercial. Representa uma marca? Veja também o Media Kit.">
<link rel="canonical" href="https://caiogare.com.br/contato/">
<meta property="og:title" content="Contato — Caio Garé">
<meta property="og:description" content="Fale com Caio Garé por e-mail para parcerias, dúvidas ou proposta comercial. Representa uma marca? Veja também o Media Kit.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://caiogare.com.br/contato/">
<meta property="og:image" content="https://caiogare.com.br/assets/img/perfil.jpg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Contato — Caio Garé">
<meta name="twitter:description" content="Fale com Caio Garé por e-mail para parcerias, dúvidas ou proposta comercial. Representa uma marca? Veja também o Media Kit.">
<meta name="twitter:image" content="https://caiogare.com.br/assets/img/perfil.jpg">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  /* cards de canal (e-mail / media kit): compactos e lado a lado, como
     ações e não blocos de conteúdo esticados na largura toda do container */
  .contact-cards{grid-template-columns:repeat(2,minmax(0,380px));justify-content:start;}
  @media (max-width:760px){.contact-cards{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header id="site-header"></header>

<section style="padding-top:40px;">
  <div class="container container-wide">
    <p class="eyebrow">contato</p>
    <h1>Fale comigo</h1>
    <p class="lead" style="margin-bottom:20px;">Para propostas de parceria, dúvidas ou qualquer outro assunto, fale direto por um destes canais:</p>

    <div class="grid grid-2 contact-cards">
      <div class="card" style="text-align:center;padding:24px 32px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div class="icon" style="margin:0 auto 12px;">✉</div>
        <h3>E-mail</h3>
        <p style="font-family:var(--font-mono);font-size:.95rem;white-space:nowrap;margin-bottom:20px;">caiogare.contato@gmail.com</p>
        <button type="button" class="btn btn-ghost" id="btn-copiar-email" style="width:100%;max-width:280px;">Copiar e-mail</button>
      </div>

      <div class="card" style="text-align:center;padding:24px 32px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <img src="/favicon.svg" alt="Caio Garé" class="contact-logo">
        <h3>Media Kit</h3>
        <p style="margin-bottom:20px;">Representa uma marca ou empresa?</p>
        <a href="/media-kit/" class="btn btn-primary" style="width:100%;max-width:280px;">Ver Media Kit</a>
      </div>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="/assets/js/content.js"></script>
<script src="/assets/js/analytics.js"></script>
<script src="/assets/js/nav.js"></script>
<script>
document.getElementById("btn-copiar-email").addEventListener("click", async (e) => {
  const email = "caiogare.contato@gmail.com";
  try {
    await navigator.clipboard.writeText(email);
  } catch (err) {
    // fallback pra navegadores mais antigos
    const temp = document.createElement("textarea");
    temp.value = email;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  }
  const btn = e.target;
  const original = btn.textContent;
  btn.textContent = "Copiado!";
  setTimeout(() => { btn.textContent = original; }, 1500);
});
</script>
</body>
</html>
