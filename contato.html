<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — Caio Garé</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header id="site-header"></header>

<section style="padding-top:60px;">
  <div class="container" style="max-width:560px;">
    <p class="eyebrow">contato</p>
    <h1>Fale comigo</h1>
    <p class="lead">Para propostas de parceria, dúvidas ou qualquer outro assunto, fale direto por um destes canais:</p>

    <div class="grid grid-2" style="margin-top:32px;">
      <div class="card" style="text-align:center;">
        <div class="icon" style="margin:0 auto 12px;">✉</div>
        <h3>E-mail</h3>
        <p style="font-family:var(--font-mono);font-size:.85rem;word-break:break-all;">caiogare.contato@gmail.com</p>
        <button type="button" class="btn btn-ghost" id="btn-copiar-email" style="width:100%;">Copiar e-mail</button>
      </div>
      <a href="https://www.instagram.com/caiogare" target="_blank" rel="noopener" class="card" style="text-align:center;">
        <div class="icon" style="margin:0 auto 12px;">◈</div>
        <h3>Instagram</h3>
        <p style="font-size:.85rem;">@caiogare</p>
      </a>
    </div>

    <p style="margin-top:24px;font-size:.85rem;text-align:center;">
      Representa uma marca? <a href="media-kit.html" style="color:var(--accent);">Veja o Media Kit</a>.
    </p>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="assets/js/content.js"></script>
<script src="assets/js/analytics.js"></script>
<script src="assets/js/nav.js"></script>
<script>
document.getElementById("btn-copiar-email").addEventListener("click", async (e) => {
  const email = "caiogare.contato@gmail.com";
  try {
    await navigator.clipboard.writeText(email);
  } catch (err) {
    // fallback pra navegadores mais antigos
    const temp = document.createElement("textarea");
    temp.value = email;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
  }
  const btn = e.target;
  const original = btn.textContent;
  btn.textContent = "Copiado!";
  setTimeout(() => { btn.textContent = original; }, 1500);
});
</script>
</body>
</html>
