<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — Caio Garé</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header id="site-header"></header>

<section style="padding-top:60px;">
  <div class="container" style="max-width:560px;">
    <p class="eyebrow">contato</p>
    <h1>Fale comigo</h1>
    <p class="lead">Para propostas de parceria, dúvidas sobre cursos ou qualquer outro assunto.</p>
  </div>
</section>

<section class="section-border-top">
  <div class="container" style="max-width:560px;">
    <!-- Formulário via Formspree (gratuito). Troque SEU_ID_AQUI pelo
         código gerado em https://formspree.io — passo a passo no README.md -->
    <form action="https://formspree.io/f/SEU_ID_AQUI" method="POST">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required>

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required>

      <label for="assunto">Assunto</label>
      <select id="assunto" name="assunto">
        <option>Parceria / patrocínio</option>
        <option>Dúvida sobre curso</option>
        <option>Outro</option>
      </select>

      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

      <button type="submit" class="btn btn-primary" style="width:100%;">Enviar mensagem</button>
    </form>

    <p style="margin-top:24px;font-size:.85rem;">Ou direto por e-mail: <a href="mailto:contato@caiogare.com.br" style="color:var(--accent);">contato@caiogare.com.br</a></p>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="assets/js/content.js"></script>
<script src="assets/js/analytics.js"></script>
<script src="assets/js/nav.js"></script>
</body>
</html>
