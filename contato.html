<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — Caio Garé</title>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header id="site-header"></header>

<section style="padding-top:60px;">
  <div class="container" style="max-width:560px;">
    <p class="eyebrow">contato</p>
    <h1>Fale comigo</h1>
    <p class="lead">Para propostas de parceria, dúvidas ou qualquer outro assunto, fale direto por um destes canais:</p>

    <div class="card" style="margin-top:32px;">
      <h3 style="margin-bottom:10px;">E-mail</h3>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="email-contato" value="caiogare.contato@gmail.com" readonly
          style="flex:1;min-width:200px;margin-bottom:0;font-family:var(--font-mono);font-size:.88rem;">
        <button type="button" class="btn btn-ghost" id="btn-copiar-email">Copiar</button>
        <a href="mailto:caiogare.contato@gmail.com" class="btn btn-primary">Abrir e-mail</a>
      </div>
    </div>

    <a href="https://www.instagram.com/caiogare" target="_blank" rel="noopener" class="card" style="display:block;margin-top:16px;">
      <h3 style="margin-bottom:4px;">Instagram</h3>
      <p style="margin-bottom:0;">@caiogare — clique para abrir</p>
    </a>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="assets/js/content.js"></script>
<script src="assets/js/analytics.js"></script>
<script src="assets/js/nav.js"></script>
<script>
document.getElementById("btn-copiar-email").addEventListener("click", async () => {
  const input = document.getElementById("email-contato");
  input.select();
  try {
    await navigator.clipboard.writeText(input.value);
    const btn = document.getElementById("btn-copiar-email");
    const original = btn.textContent;
    btn.textContent = "Copiado!";
    setTimeout(() => { btn.textContent = original; }, 1500);
  } catch (e) {
    document.execCommand("copy");
  }
});
</script>
</body>
</html>
